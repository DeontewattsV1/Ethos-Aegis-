<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
<title id="title">Ethos Aegis Primary Emblem</title>
<desc id="desc">Original Ethos Aegis brand asset. Abstract shield, aperture, mesh, and containment geometry. No real military insignia, seal, flag, eagle, star, or weapon is used.</desc>
<defs>
  <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#9FC3D7" stop-opacity="0.95"/>
    <stop offset="48%" stop-color="#5E89A8" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#222832" stop-opacity="0.9"/>
  </linearGradient>
  <radialGradient id="blackGlow" cx="50%" cy="45%" r="62%">
    <stop offset="0%" stop-color="#222832" stop-opacity="0.85"/>
    <stop offset="65%" stop-color="#0A0B0D" stop-opacity="1"/>
    <stop offset="100%" stop-color="#050607" stop-opacity="1"/>
  </radialGradient>
  <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <pattern id="microgrid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M32 0H0V32" fill="none" stroke="#687482" stroke-opacity="0.08" stroke-width="1"/>
  </pattern>
</defs>
<rect width="1024" height="1024" fill="url(#blackGlow)"/><rect width="1024" height="1024" fill="url(#microgrid)"/>
