name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # The configuration files committed to the repo drive the behavior. We
          # don't pass `release-type` here so that the schema in
          # release-please-config.json is the single source of truth.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
