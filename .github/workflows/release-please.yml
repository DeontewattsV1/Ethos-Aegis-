name: release-please

on:
  push:
    branches:
      - main

# Default everything to read-only; the one job below opts in to the writes it
# actually needs (defense-in-depth if future jobs are added to this workflow).
permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Pinned to the v4 tag's commit SHA for supply-chain safety; the trailing
      # `# v4` is the conventional marker dependabot/renovate look for when
      # bumping pinned actions.
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          # The configuration files committed to the repo drive the behavior. We
          # don't pass `release-type` here so that the schema in
          # release-please-config.json is the single source of truth.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
