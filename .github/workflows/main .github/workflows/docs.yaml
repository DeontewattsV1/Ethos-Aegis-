name: Regenerate Docs

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: docs-regeneration
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    # Infinite-loop guard: block re-triggering if the commit message contains the sentinel
    if: "!contains(github.event.head_commit.message, 'docs refresh README snippets')"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Regenerate docs
        run: |
          npm install
          npm run docs:generate

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs refresh README snippets + output snapshots" || echo "No changes to commit"
          git push
