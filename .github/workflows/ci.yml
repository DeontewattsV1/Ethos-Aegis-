name: Validate Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: validate-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify npm lockfile
        run: test -f package-lock.json

      - name: Clean install
        run: npm ci

      - name: Run tests
        env:
          CI: true
        run: npm test
