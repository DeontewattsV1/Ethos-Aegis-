name: celestial-release

# Paid-package release pipeline for the Celestial Agent bundle.
#
# Triggers on a tag of the shape `celestial-vX.Y.Z` — this lets us
# version the Celestial sub-package independently of the rest of
# Ethos Aegis. The workflow builds the wheel + sdist, attaches them
# (plus the JSON spec schema) to a GitHub Release, and optionally
# publishes to PyPI when the `PYPI_API_TOKEN` secret is set.
#
# Why a separate release pipeline?  The Celestial Language + Agent
# Specification Pack are marketed as a stand-alone cyber-security
# package on top of the (free) Ethos Aegis core, so we want a clean
# tag → release flow that does not interfere with release-please.
ci(celestial): scope all workflow permissions per-job
SonarCloud rules githubactions:S8233 and S8264 both want permissions
declared at the job level rather than the workflow level so each job
gets only the minimum scope it needs.  Move all 'permissions:' blocks
in celestial.yml, celestial-veracode.yml, and celestial-release.yml
out of the workflow root and into the specific jobs that use them.

- celestial.yml      : both jobs => contents: read
- celestial-veracode : pipeline-scan => contents: read
- celestial-release  : build/publish-pypi => contents: read,
                       release => contents: write
on:
  push:
    tags:
      - "celestial-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release (e.g. celestial-v0.1.0)"
        required: true

# Permissions are declared at the job level rather than at the workflow
# level (SonarCloud rules githubactions:S8233 and S8264) so each job
# only sees the minimum scope it needs.

jobs:
  build:
    name: build dist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist
        working-directory: python
        run: python -m build

      - name: Verify metadata
        working-directory: python
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: celestial-dist
          path: |
            python/dist/*
            python/ethos_aegis/celestial/agent_spec_schema.json

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write  # required by softprops/action-gh-release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          name: celestial-dist
          path: artifacts

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      # Pinned to the full commit SHA of v2 (softprops/action-gh-release).
      # SonarCloud rule githubactions:S7637 requires third-party actions to
      # be referenced by immutable SHA rather than a mutable tag.
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            artifacts/dist/*.whl
            artifacts/dist/*.tar.gz
            artifacts/ethos_aegis/celestial/agent_spec_schema.json

  publish-pypi:
    name: PyPI (optional)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: celestial-dist
          path: artifacts

      - name: Detect PYPI token
        id: gate
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "${PYPI_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PYPI_API_TOKEN not configured — skipping publish step."
          fi

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.enabled == 'true'
        with:
          python-version: "3.12"

      - name: Publish to PyPI
        if: steps.gate.outputs.enabled == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine upload artifacts/dist/*
