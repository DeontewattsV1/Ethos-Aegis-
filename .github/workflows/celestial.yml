name: celestial

# CI for the ethos_aegis.celestial sub-package: lint + tests + wheel build.
# This is independent of the existing `python.yml` workflow so the
# Celestial Language + Agent Specification Pack can ship + version on its
# own cadence (it is the seed of the paid Ethos Aegis cyber-security
# package).

on:
  push:
    branches: [main]
    paths:
      - "python/ethos_aegis/celestial/**"
      - "python/tests/celestial/**"
      - "python/pyproject.toml"
      - ".github/workflows/celestial.yml"
  pull_request:
    paths:
      - "python/ethos_aegis/celestial/**"
      - "python/tests/celestial/**"
      - "python/pyproject.toml"
      - ".github/workflows/celestial.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: celestial-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install dev + celestial extras
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,celestial]'

      - name: Ruff (celestial only)
        working-directory: python
        run: ruff check ethos_aegis/celestial tests/celestial

      - name: Mypy (celestial only)
        working-directory: python
        run: mypy ethos_aegis/celestial

      - name: Pytest (celestial only)
        working-directory: python
        run: python -m pytest tests/celestial -v

  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        working-directory: python
        run: python -m build

      - name: Verify metadata
        working-directory: python
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: ethos-aegis-dist
          path: python/dist/*
          retention-days: 14
