name: Release Packages

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only run for non-prerelease releases (skip alpha/beta/rc)
    if: ${{ !contains(github.event.release.tag_name, '-') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build 2>/dev/null || true

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public --provenance

  publish-github:
    name: Attach assets to release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Package TypeScript source
        run: |
          mkdir -p release-assets
          tar -czf release-assets/source.tar.gz src/ --exclude='node_modules'

      - name: Upload source archive
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-assets/source.tar.gz