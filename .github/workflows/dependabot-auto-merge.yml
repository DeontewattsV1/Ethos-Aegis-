name: Dependabot Auto-Merge

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  check_suite:
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  statuses: read

jobs:
  auto-merge:
    name: Auto-Merge
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Wait for CI to complete
        uses: actions/github-script@v7
        with:
          retries: 3
          retry-wait-seconds: 30
          script: |
            async function waitForCI() {
              const pullNumber = context.payload.pull_request?.number || context.payload.issue?.number;
              if (!pullNumber) {
                console.log('No pull request number found');
                return;
              }

              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber,
              });

              console.log('PR state:', pr.mergeable_state);

              if (pr.mergeable_state === 'clean') {
                console.log('PR is clean, ready to merge');
                return;
              }

              const maxWait = 30 * 60 * 1000;
              const checkInterval = 30 * 1000;
              const startTime = Date.now();

              while (Date.now() - startTime < maxWait) {
                const { data: updatedPr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pullNumber,
                });

                console.log('Current state:', updatedPr.mergeable_state);

                if (updatedPr.mergeable_state === 'clean') {
                  console.log('PR is now clean');
                  return;
                }

                const { data: statuses } = await github.rest.repos.listCommitStatusesForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: updatedPr.head.sha,
                });

                const latestStatus = statuses[0];
                if (latestStatus && latestStatus.state === 'failure') {
                  console.log('Found failed status check:', latestStatus.context);
                  core.setFailed(`CI check failed: ${latestStatus.context}`);
                  return;
                }

                await new Promise(resolve => setTimeout(resolve, checkInterval));
              }

              console.log('Timeout waiting for CI');
            }

            await waitForCI();

      - name: Merge PR
        uses: actions/github-script@v7
        with:
          script: |
            const pullNumber = context.payload.pull_request?.number || context.payload.issue?.number;
            if (!pullNumber) {
              console.log('No pull request number found');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
            });

            if (pr.mergeable_state === 'clean' && pr.mergeable === true) {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber,
                merge_method: 'squash',
              });
              console.log(`Successfully merged PR #${pullNumber}`);
            } else {
              console.log(`PR #${pullNumber} is not ready to merge. State: ${pr.mergeable_state}`);
            }